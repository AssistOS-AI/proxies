<div class="sg-settings-modal">
    <div class="sg-modal-header">
        <h2>Soul Gateway</h2>
        <button class="sg-close-btn" data-local-action="closeModal">&times;</button>
    </div>

    <div class="sg-modal-body">
        <div class="sg-tabs">
            <button class="sg-tab active" data-tab="providers" data-local-action="switchTab">Providers</button>
            <button class="sg-tab" data-tab="models" data-local-action="switchTab">Models</button>
            <button class="sg-tab" data-tab="keys" data-local-action="switchTab">API Keys</button>
        </div>

        <!-- Providers Tab -->
        <div class="sg-tab-content active" id="tab-providers">
            <div class="sg-section-header">
                <h3>Providers</h3>
                <button class="sg-btn sg-btn-primary" data-local-action="showAddProvider">Add Provider</button>
            </div>
            <div class="sg-status-bar" id="providers-status" role="status" aria-live="polite"></div>
            <div class="sg-list" id="providers-list"></div>

            <!-- Add/Edit Provider Form (hidden by default) -->
            <div class="sg-form-panel" id="provider-form" style="display:none;">
                <h4 id="provider-form-title">Add Provider</h4>
                <div class="sg-form-group">
                    <label for="provider-template">Template</label>
                    <select id="provider-template">
                        <option value="">Custom...</option>
                    </select>
                </div>
                <div class="sg-form-group">
                    <label for="provider-key">Provider Key</label>
                    <input type="text" id="provider-key" placeholder="e.g. my-openai">
                </div>
                <div class="sg-form-group">
                    <label for="provider-name">Display Name</label>
                    <input type="text" id="provider-name" placeholder="e.g. My OpenAI">
                </div>
                <div class="sg-form-group">
                    <label for="provider-adapter">Adapter</label>
                    <select id="provider-adapter">
                        <option value="openai-api">OpenAI API</option>
                        <option value="anthropic">Anthropic</option>
                        <option value="openrouter">OpenRouter</option>
                    </select>
                </div>
                <div class="sg-form-group">
                    <label for="provider-auth">Auth Strategy</label>
                    <select id="provider-auth">
                        <option value="api_key">API Key</option>
                        <option value="oauth">OAuth</option>
                        <option value="none">None</option>
                    </select>
                </div>
                <div class="sg-form-group">
                    <label for="provider-baseurl">Base URL</label>
                    <input type="text" id="provider-baseurl" placeholder="Optional override">
                </div>
                <div class="sg-form-group" id="provider-apikey-group">
                    <label for="provider-apikey">API Key</label>
                    <input type="password" id="provider-apikey" placeholder="Enter API key" autocomplete="off">
                </div>
                <div class="sg-form-actions">
                    <button class="sg-btn" data-local-action="cancelProviderForm">Cancel</button>
                    <button class="sg-btn sg-btn-primary" data-local-action="submitProvider">Save</button>
                </div>
            </div>
        </div>

        <!-- Models Tab -->
        <div class="sg-tab-content" id="tab-models">
            <div class="sg-section-header">
                <h3>Models</h3>
            </div>
            <div class="sg-status-bar" id="models-status" role="status" aria-live="polite"></div>
            <div class="sg-list" id="models-list"></div>
        </div>

        <!-- API Keys Tab -->
        <div class="sg-tab-content" id="tab-keys">
            <div class="sg-section-header">
                <h3>API Keys</h3>
                <button class="sg-btn sg-btn-primary" data-local-action="showCreateKey">Generate Key</button>
            </div>
            <div class="sg-status-bar" id="keys-status" role="status" aria-live="polite"></div>
            <div class="sg-list" id="keys-list"></div>

            <!-- Create Key Form (hidden by default) -->
            <div class="sg-form-panel" id="key-form" style="display:none;">
                <h4>Generate API Key</h4>
                <div class="sg-form-group">
                    <label for="key-label">Label</label>
                    <input type="text" id="key-label" placeholder="e.g. dev-key">
                </div>
                <div class="sg-form-group">
                    <label for="key-rpm">RPM Limit</label>
                    <input type="number" id="key-rpm" value="60">
                </div>
                <div class="sg-form-group">
                    <label for="key-tpm">TPM Limit</label>
                    <input type="number" id="key-tpm" value="100000">
                </div>
                <div class="sg-form-actions">
                    <button class="sg-btn" data-local-action="cancelKeyForm">Cancel</button>
                    <button class="sg-btn sg-btn-primary" data-local-action="submitKey">Generate</button>
                </div>
            </div>

            <!-- Key reveal (shown after creation) -->
            <div class="sg-key-reveal" id="key-reveal" style="display:none;">
                <div class="sg-warning">Copy this key now. It will not be shown again.</div>
                <div class="sg-key-value" id="key-reveal-value"></div>
                <button class="sg-btn" data-local-action="copyKey">Copy</button>
                <button class="sg-btn" data-local-action="dismissKeyReveal">Done</button>
            </div>
        </div>
    </div>
</div>
