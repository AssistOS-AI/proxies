                                                                </button>
                                                                <button
                                                                    class="btn btn-error btn-xs"
                                                                    :disabled="k.status === 'revoked' || k.is_revoked"
                                                                    @click="revoke(k)"
                                                                >
                                                                    Revoke
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Blacklist Management Page -->
                        <div x-show="page === 'blacklist'" x-cloak>
                            <div
                                x-data="blacklistPage()"
                                x-init="init()"
                                @page-change.window="$event.detail === 'blacklist' && init()"
                            >
                                <div
                                    class="flex justify-between items-center mb-4"
                                >
                                    <h2 class="text-lg font-bold">
                                        Blacklist Rules
                                    </h2>
                                    <button
                                        class="btn btn-primary btn-sm"
                                        @click="showCreate = true"
                                    >
                                        Add Rule
                                    </button>
                                </div>
                                <dialog
                                    class="modal"
                                    :class="{'modal-open': showCreate}"
                                >
                                    <div class="modal-box">
                                        <h3
                                            class="font-bold text-lg"
                                            x-text="editing ? 'Edit Rule' : 'Add Rule'"
                                        ></h3>
                                        <div class="form-control">
                                            <label class="label">Pattern</label
                                            ><input
                                                type="text"
                                                class="input input-bordered"
                                                x-model="form.pattern"
                                            />
                                        </div>
                                        <div class="form-control">
                                            <label class="label"
                                                >Match Type</label
                                            >
                                            <select
                                                class="select select-bordered"
                                                x-model="form.match_type"
                                            >
                                                <option>substring</option>
                                                <option>exact</option>
                                                <option>regex</option>
                                            </select>
                                        </div>
                                        <div class="form-control">
                                            <label class="label"
                                                >Description</label
                                            ><input
                                                type="text"
                                                class="input input-bordered"
                                                x-model="form.description"
                                            />
                                        </div>
                                        <div class="modal-action">
                                            <button
                                                class="btn btn-ghost"
                                                @click="showCreate = false; editing = null"
                                            >
                                                Cancel
                                            </button>
                                            <button
                                                class="btn btn-primary"
                                                @click="save()"
                                            >
                                                Save
                                            </button>
                                        </div>
                                    </div>
                                    <div
                                        class="modal-backdrop"
                                        @click="showCreate = false; editing = null"
                                    ></div>
                                </dialog>
                                <div class="card bg-base-100 shadow">
                                    <div class="card-body p-0">
                                        <table class="table table-sm">
                                            <thead>
                                                <tr>
                                                    <th>Pattern</th>
                                                    <th>Type</th>
                                                    <th>Description</th>
                                                    <th>Enabled</th>
                                                    <th>Actions</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template
                                                    x-for="r in rules"
                                                    :key="r.id"
                                                >
                                                    <tr>
                                                        <td
                                                            class="font-mono text-xs"
                                                            x-text="r.pattern"
                                                        ></td>
                                                        <td>
                                                            <span
                                                                class="badge badge-sm"
                                                                x-text="r.match_type"
                                                            ></span>
                                                        </td>
                                                        <td
                                                            x-text="r.description || '-'"
                                                        ></td>
                                                        <td>
                                                            <input
                                                                type="checkbox"
                                                                class="toggle toggle-sm"
                                                                :checked="r.enabled"
                                                                @change="toggleEnabled(r)"
                                                            />
                                                        </td>
                                                        <td>
                                                            <div
                                                                class="flex gap-1"
                                                            >
                                                                <button
                                                                    class="btn btn-ghost btn-xs"
                                                                    @click="edit(r)"
                                                                >
                                                                    Edit
                                                                </button>
                                                                <button
                                                                    class="btn btn-error btn-xs"
                                                                    @click="remove(r)"
                                                                >
                                                                    Delete
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Middlewares Page -->
                        <div x-show="page === 'middlewares'" x-cloak>
                            <div
                                x-data="middlewaresPage()"
                                x-init="init()"
                                @page-change.window="$event.detail === 'middlewares' && init()"
                            >
                                <div
                                    class="flex justify-between items-center mb-4"
                                >
                                    <h2 class="text-lg font-bold">
                                        Middlewares
                                    </h2>
                                    <button
                                        class="btn btn-sm btn-outline"
                                        @click="rescan()"
                                    >
                                        Rescan Files
                                    </button>
                                </div>

                                <div class="flex gap-4">
                                    <!-- Left panel: middleware list -->
                                    <div class="w-64 shrink-0">
                                        <div class="card bg-base-100 shadow">
                                            <div class="card-body p-2">
                                                <template
                                                    x-for="mw in middlewares"
                                                    :key="mw.id"
                                                >
                                                    <div
                                                        class="p-2 rounded cursor-pointer hover:bg-base-200 flex flex-col gap-1"
                                                        :class="{'bg-base-200': selectedMw?.id === mw.id}"
                                                        @click="selectMw(mw)"
                                                    >
                                                        <div
                                                            class="flex items-center gap-2"
                                                        >
                                                            <span
                                                                class="font-mono text-sm font-bold"
                                                                x-text="mw.name"
                                                            ></span>
                                                            <span
                                                                class="badge badge-xs"
                                                                :class="typeBadge(mw.source_type || mw.type || 'middleware')"
                                                                x-text="(mw.source_type || mw.type || 'middleware').toUpperCase()"
                                                            ></span>
                                                        </div>
                                                        <div
                                                            class="flex items-center gap-2 text-xs opacity-60"
                                                        >
                                                            <span
                                                                x-text="'v' + (mw.version || '1.0.0')"
                                                            ></span>
                                                            <span
                                                                x-show="mw.supports_streaming"
                                                                class="badge badge-xs badge-outline"
                                                                >stream</span
                                                            >
                                                            <span
                                                                x-show="mw.source_type === 'missing' || (!mw.source_type && !mw.is_discovered)"
                                                                class="badge badge-xs badge-error"
                                                                >missing</span
                                                            >
                                                        </div>
                                                    </div>
                                                </template>
                                                <div
                                                    x-show="middlewares.length === 0"
                                                    class="text-center text-sm opacity-50 py-4"
                                                >
                                                    No middlewares found.<br />Add
                                                    .mjs files to middlewares/
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Right panel: middleware details + tier assignments -->
                                    <div class="flex-1">
                                        <template x-if="selectedMw">
                                            <div>
                                                <!-- Middleware info -->
                                                <div
                                                    class="card bg-base-100 shadow mb-4"
                                                >
                                                    <div class="card-body p-4">
                                                        <h3
                                                            class="font-bold text-lg"
                                                            x-text="selectedMw.name"
                                                        ></h3>
                                                        <p
                                                            class="text-sm opacity-70"
                                                            x-text="selectedMw.description || 'No description'"
                                                        ></p>
                                                        <div
                                                            class="flex gap-3 mt-2 text-xs"
                                                        >
                                                            <span
                                                                >Type:
                                                                <span
                                                                    class="badge badge-sm"
                                                                    :class="typeBadge(selectedMw.source_type || selectedMw.type || 'middleware')"
                                                                    x-text="selectedMw.source_type || selectedMw.type || 'middleware'"
                                                                ></span
                                                            ></span>
                                                            <span
                                                                >File:
                                                                <code
                                                                    class="text-xs"
                                                                    x-text="selectedMw.module_path || selectedMw.file_name"
                                                                ></code
                                                            ></span>
                                                            <span
                                                                >Version:
                                                                <span
                                                                    x-text="selectedMw.version || '1.0.0'"
                                                                ></span
                                                            ></span>
                                                            <span
                                                                x-show="selectedMw.supports_streaming"
                                                                >Streaming:
                                                                Yes</span
                                                            >
                                                        </div>
                                                        <div
                                                            class="mt-2"
                                                            x-show="selectedMw.default_settings && Object.keys(selectedMw.default_settings).length > 0"
                                                        >
                                                            <span
                                                                class="text-xs font-bold"
                                                                >Default
                                                                Settings:</span
                                                            >
                                                            <pre
                                                                class="text-xs bg-base-200 p-2 rounded mt-1 overflow-x-auto"
                                                                x-text="JSON.stringify(selectedMw.default_settings, null, 2)"
                                                            ></pre>
                                                        </div>
                                                    </div>
                                                </div>

                                                <!-- Model & tier assignments (unified) -->
                                                <div
                                                    class="card bg-base-100 shadow"
                                                >
                                                    <div class="card-body p-0">
                                                        <div class="p-4 pb-2">
                                                            <h3
                                                                class="font-bold"
                                                            >
                                                                Assignments
                                                            </h3>
                                                        </div>
                                                        <table
                                                            class="table table-sm"
                                                        >
                                                            <thead>
                                                                <tr>
                                                                    <th>
                                                                        Name
                                                                    </th>
                                                                    <th>
                                                                        Attached
                                                                    </th>
                                                                    <th>
                                                                        Enabled
                                                                    </th>
                                                                    <th>
                                                                        Order
                                                                    </th>
                                                                    <th>
                                                                        Settings
                                                                    </th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                <template
                                                                    x-for="a in modelAssignments"
                                                                    :key="a.model.id"
                                                                >
                                                                    <tr>
                                                                        <td>
                                                                            <span
                                                                                class="font-mono text-xs"
                                                                                x-text="a.model.display_name || a.model.model_key"
                                                                            ></span>
                                                                            <span
                                                                                class="badge badge-xs ml-1"
                                                                                :class="a.model.enabled ? 'badge-success' : 'badge-ghost'"
                                                                                x-text="a.model.enabled ? 'on' : 'off'"
                                                                            ></span>
                                                                        </td>
                                                                        <td>
                                                                            <input
                                                                                type="checkbox"
                                                                                class="toggle toggle-sm toggle-primary"
                                                                                :checked="a.assigned"
                                                                                @change="toggleModelAssignment(a)"
                                                                            />
                                                                        </td>
                                                                        <td>
                                                                            <input
                                                                                type="checkbox"
                                                                                class="toggle toggle-sm"
                                                                                :checked="a.enabled"
                                                                                :disabled="!a.assigned"
                                                                                @change="toggleModelEnabled(a)"
                                                                            />
                                                                        </td>
                                                                        <td>
                                                                            <input
                                                                                type="number"
                                                                                class="input input-bordered input-xs w-16"
                                                                                :value="a.sortOrder"
                                                                                :disabled="!a.assigned"
                                                                                @change="a.sortOrder = $event.target.value; updateModelSortOrder(a)"
                                                                            />
                                                                        </td>
                                                                        <td>
                                                                            <button
                                                                                class="btn btn-ghost btn-xs"
                                                                                :disabled="!a.assigned"
                                                                                @click="openSettings(a)"
                                                                            >
                                                                                Configure
                                                                            </button>
                                                                        </td>
                                                                    </tr>
                                                                </template>
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                </div>
                                            </div>
                                        </template>
                                        <div
                                            x-show="!selectedMw"
                                            class="text-center opacity-50 py-12"
                                        >
                                            Select a middleware to view details
                                        </div>
                                    </div>
                                </div>

                                <!-- Settings modal -->
                                <dialog
                                    class="modal"
                                    :class="{'modal-open': showSettings}"
                                >
                                    <div class="modal-box max-w-lg">
                                        <h3 class="font-bold text-lg">
                                            Configure Middleware
                                        </h3>
                                        <p
                                            class="text-sm opacity-70 mb-2"
                                            x-text="'Settings for: ' + (editingAssignment?.model?.model_key || editingAssignment?.model?.name || '')"
                                        ></p>
                                        <div class="form-control">
                                            <textarea
                                                class="textarea textarea-bordered font-mono text-xs h-48"
                                                x-model="settingsJson"
                                            ></textarea>
                                            <span
                                                class="text-error text-xs mt-1"
                                                x-show="settingsError"
                                                x-text="settingsError"
                                            ></span>
                                        </div>
                                        <div class="modal-action">
                                            <button
                                                class="btn btn-ghost"
                                                @click="showSettings = false"
                                            >
                                                Cancel
                                            </button>
                                            <button
                                                class="btn btn-primary"
                                                @click="saveSettings()"
                                            >
                                                Save
                                            </button>
                                        </div>
                                    </div>
                                    <div
                                        class="modal-backdrop"
                                        @click="showSettings = false"
                                    ></div>
                                </dialog>
                            </div>
                        </div>

                        <!-- Export Page -->
                        <div x-show="page === 'export'" x-cloak>
                            <div x-data="exportPage()" x-init="init()">
                                <div
                                    class="flex justify-between items-center mb-4"
                                >
                                    <h2 class="text-lg font-bold">
                                        Export Configuration
                                    </h2>
                                </div>

                                <!-- Format tabs + API key -->
                                <div
                                    class="flex flex-wrap gap-4 items-end mb-4"
                                >
                                    <div>
                                        <span
                                            class="text-xs opacity-50 block mb-1"
                                            >Format</span
                                        >
                                        <div class="flex gap-0.5">
                                            <button
                                                class="btn btn-sm"
                                                :class="format === 'opencode' ? 'btn-primary' : 'btn-ghost'"
                                                @click="format = 'opencode'"
                                            >
                                                OpenCode
                                            </button>
                                            <button
                                                class="btn btn-sm"
                                                :class="format === 'claude-code' ? 'btn-primary' : 'btn-ghost'"
                                                @click="format = 'claude-code'"
                                            >
                                                Claude Code
                                            </button>
                                            <button
                                                class="btn btn-sm"
                                                :class="format === 'codex' ? 'btn-primary' : 'btn-ghost'"
                                                @click="format = 'codex'"
                                            >
                                                Codex
                                            </button>
                                        </div>
                                    </div>
                                    <div class="form-control">
                                        <span
                                            class="text-xs opacity-50 block mb-1"
                                            >API Key
                                            <span class="text-warning"
                                                >(paste full key -- hints shown
                                                for reference only)</span
                                            ></span
                                        >
                                        <div class="flex gap-1 items-center">
                                            <input
                                                type="text"
                                                class="input input-bordered input-sm w-80 font-mono"
                                                x-model="apiKey"
                                                placeholder="sk-soul-..."
                                            />
                                            <span
                                                class="text-xs opacity-40"
                                                x-show="keys.length > 0"
                                                >Keys:</span
                                            >
                                            <template
                                                x-for="k in keys"
                                                :key="k.id"
                                            >
                                                <span
                                                    class="badge badge-xs badge-ghost font-mono"
                                                    x-text="(k.label || '') + ' ' + (k.key_hint || '')"
                                                    :title="'Hint: ' + k.key_hint"
                                                ></span>
                                            </template>
                                        </div>
                                    </div>
                                    <div class="form-control">
                                        <span
                                            class="text-xs opacity-50 block mb-1"
                                            >Gateway URL</span
                                        >
                                        <input
                                            type="text"
                                            class="input input-bordered input-sm w-64 font-mono"
                                            x-model="gatewayUrl"
                                        />
                                    </div>
                                </div>

                                <!-- Two-column layout -->
                                <div
                                    class="grid grid-cols-1 lg:grid-cols-2 gap-4"
                                >
                                    <!-- Left: Model selector -->
                                    <div class="card bg-base-100 shadow">
                                        <div class="card-body p-3">
                                            <div
                                                class="flex flex-wrap gap-2 items-center mb-2"
                                            >
                                                <input
                                                    type="text"
                                                    class="input input-bordered input-sm flex-1 min-w-[150px]"
                                                    placeholder="Search models, providers, tags..."
                                                    x-model="search"
                                                />
                                                <label
                                                    class="label cursor-pointer gap-1"
                                                    ><span
                                                        class="label-text text-xs"
                                                        >Enabled</span
                                                    ><input
                                                        type="checkbox"
                                                        class="toggle toggle-xs"
                                                        x-model="enabledOnly"
                                                /></label>
                                                <label
                                                    class="label cursor-pointer gap-1"
                                                    ><span
                                                        class="label-text text-xs"
                                                        >Free</span
                                                    ><input
                                                        type="checkbox"
                                                        class="toggle toggle-xs toggle-success"
                                                        x-model="freeOnly"
                                                /></label>
                                                <div class="flex gap-0.5">
                                                    <button
                                                        class="badge badge-xs cursor-pointer"
                                                        :class="billingFilter === '' ? 'badge-primary' : 'badge-ghost'"
                                                        @click="billingFilter = ''"
                                                    >
                                                        All
                                                    </button>
                                                    <button
                                                        class="badge badge-xs cursor-pointer"
                                                        :class="billingFilter === 'subscription' ? 'badge-secondary' : 'badge-ghost'"
                                                        @click="billingFilter = billingFilter === 'subscription' ? '' : 'subscription'"
                                                    >
                                                        Sub
                                                    </button>
                                                    <button
                                                        class="badge badge-xs cursor-pointer"
                                                        :class="billingFilter === 'api_key' ? 'badge-info badge-outline' : 'badge-ghost'"
                                                        @click="billingFilter = billingFilter === 'api_key' ? '' : 'api_key'"
                                                    >
                                                        API
                                                    </button>
                                                </div>
                                            </div>
                                            <!-- Tag chips -->
                                            <div
                                                class="flex flex-wrap gap-0.5 mb-2"
                                                x-show="allTags.length > 0"
                                            >
                                                <template
                                                    x-for="tag in allTags"
                                                    :key="tag"
                                                >
                                                    <button
                                                        class="badge badge-xs cursor-pointer"
                                                        :class="tagFilter === tag ? 'badge-primary' : 'badge-ghost'"
                                                        @click="tagFilter = tagFilter === tag ? '' : tag"
                                                        x-text="tag"
                                                    ></button>
                                                </template>
                                            </div>
                                            <!-- Actions -->
                                            <div
                                                class="flex gap-2 items-center mb-2"
                                            >
                                                <button
                                                    class="btn btn-xs btn-ghost"
                                                    @click="selectAllVisible()"
                                                >
                                                    Select all visible
                                                </button>
                                                <button
                                                    class="btn btn-xs btn-ghost"
                                                    @click="clearAll()"
                                                >
                                                    Clear
                                                </button>
                                                <span
                                                    class="text-xs opacity-50"
                                                    x-text="`${selectedCount} selected`"
                                                ></span>
                                                <div class="flex-1"></div>
                                                <span
                                                    class="text-xs opacity-50"
                                                    x-text="`${filteredModels.length} models`"
                                                ></span>
                                            </div>
                                            <!-- Default model -->
                                            <div
                                                class="flex gap-2 items-center mb-2"
                                                x-show="selectedCount > 0"
                                            >
                                                <span class="text-xs opacity-50"
                                                    >Default model:</span
                                                >
                                                <select
                                                    class="select select-bordered select-xs font-mono"
                                                    x-model="defaultModel"
                                                >
                                                    <template
                                                        x-for="name in selectedModels"
                                                        :key="name"
                                                    >
                                                        <option
                                                            :value="name"
                                                            x-text="name"
                                                        ></option>
                                                    </template>
                                                </select>
                                            </div>
                                            <!-- Model list -->
                                            <div
                                                class="overflow-auto"
                                                style="max-height: 50vh"
                                            >
                                                <table class="table table-xs">
                                                    <thead
                                                        class="sticky top-0 bg-base-100"
                                                    >
                                                        <tr>
                                                            <th
                                                                class="w-8"
                                                            ></th>
                                                            <th>Model</th>
                                                            <th>Tags</th>
                                                            <th>Billing</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        <template
                                                            x-for="m in filteredModels"
                                                            :key="m.id"
                                                        >
                                                            <tr
                                                                class="hover cursor-pointer"
                                                                :class="{'bg-primary/10': isSelected(m.model_key)}"
                                                                @click="toggleModel(m.model_key)"
                                                            >
                                                                <td @click.stop>
                                                                    <input
                                                                        type="checkbox"
                                                                        class="checkbox checkbox-xs checkbox-primary"
                                                                        :checked="isSelected(m.model_key)"
                                                                        @change="toggleModel(m.model_key)"
                                                                    />
                                                                </td>
                                                                <td
                                                                    class="font-mono text-xs"
                                                                    x-text="m.model_key"
                                                                ></td>
                                                                <td
                                                                    class="text-xs"
                                                                >
                                                                    <div
                                                                        class="flex flex-wrap gap-0.5 max-w-[150px]"
                                                                    >
                                                                        <template
                                                                            x-for="tag in (m.tags || []).slice(0, 3)"
                                                                            :key="tag"
                                                                            ><span
                                                                                class="badge badge-xs badge-outline"
                                                                                x-text="tag"
                                                                            ></span
                                                                        ></template>
                                                                    </div>
                                                                </td>
                                                                <td>
                                                                    <span
                                                                        class="badge badge-xs"
                                                                        :class="sgAuthBadge(m).classes"
                                                                        x-text="sgAuthBadge(m).label"
                                                                    ></span>
                                                                </td>
                                                            </tr>
                                                        </template>
                                                        <tr
                                                            x-show="filteredModels.length === 0"
                                                        >
                                                            <td
                                                                colspan="4"
                                                                class="text-center opacity-50 py-4"
                                                            >
                                                                No models match
                                                            </td>
                                                        </tr>
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Right: Config preview -->
                                    <div class="card bg-base-100 shadow">
                                        <div class="card-body p-3">
                                            <div
                                                class="flex justify-between items-center mb-2"
                                            >
                                                <span
                                                    class="text-sm font-bold"
                                                    x-text="configFileName"
                                                ></span>
                                                <div class="flex gap-1">
                                                    <button
                                                        class="btn btn-sm btn-ghost"
                                                        @click="copyConfig()"
                                                        x-text="copied ? 'Copied!' : 'Copy'"
                                                        :class="{'text-success': copied}"
                                                    ></button>
                                                    <button
                                                        class="btn btn-sm btn-primary"
                                                        @click="downloadConfig()"
                                                    >
                                                        Download
                                                    </button>
                                                </div>
                                            </div>
                                            <pre
                                                class="bg-base-200 rounded-lg p-3 overflow-auto text-xs font-mono whitespace-pre"
                                                style="max-height: 60vh"
                                                x-text="configOutput || 'Select models to generate config...'"
                                            ></pre>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <script src="js/markdown.js"></script>
        <script src="js/app.mjs"></script>
    </body>
</html>
