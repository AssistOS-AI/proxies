<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Soul Gateway</title>
        <base href="/management/" />
        <link
            href="https://cdn.jsdelivr.net/npm/daisyui@4.12.14/dist/full.min.css"
            rel="stylesheet"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"
        ></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
        <link rel="stylesheet" href="css/app.css" />
    </head>
    <body class="min-h-screen bg-base-200">
        <div x-data="app()" x-init="init()">
            <!-- Login Screen -->
            <template x-if="!authenticated">
                <div class="flex items-center justify-center min-h-screen">
                    <div
                        x-data="loginForm()"
                        class="card bg-base-100 shadow-xl w-96"
                    >
                        <div class="card-body">
                            <h2 class="card-title justify-center text-2xl mb-4">
                                Soul Gateway
                            </h2>
                            <div class="form-control">
                                <label class="label"
                                    ><span class="label-text"
                                        >Password</span
                                    ></label
                                >
                                <input
                                    type="password"
                                    class="input input-bordered"
                                    x-model="password"
                                    @keydown.enter="login()"
                                    placeholder="Enter dashboard password"
                                    autofocus
                                />
                            </div>
                            <div
                                x-show="error"
                                class="alert alert-error mt-2 text-sm"
                            >
                                <span x-text="error"></span>
                            </div>
                            <div class="form-control mt-4">
                                <button
                                    class="btn btn-primary"
                                    @click="login()"
                                    :disabled="loading"
                                >
                                    <span x-show="!loading">Login</span>
                                    <span
                                        x-show="loading"
                                        class="loading loading-spinner loading-sm"
                                    ></span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Authenticated Dashboard -->
            <template x-if="authenticated">
                <div>
                    <!-- Navbar -->
                    <div class="navbar bg-base-100 shadow-lg">
                        <div class="navbar-start">
                            <div class="dropdown">
                                <label
                                    tabindex="0"
                                    class="btn btn-ghost lg:hidden"
                                >
                                    <svg
                                        xmlns="http://www.w3.org/2000/svg"
                                        class="h-5 w-5"
                                        fill="none"
                                        viewBox="0 0 24 24"
                                        stroke="currentColor"
                                    >
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M4 6h16M4 12h8m-8 6h16"
                                        />
                                    </svg>
                                </label>
                                <ul
                                    tabindex="0"
                                    class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 rounded-box w-52"
                                >
                                    <template x-for="p in pages" :key="p.id">
                                        <li>
                                            <a
                                                :class="{'active': page === p.id}"
                                                @click="navigate(p.id)"
                                                x-text="p.label"
                                            ></a>
                                        </li>
                                    </template>
                                </ul>
                            </div>
                            <a
                                class="btn btn-ghost text-xl"
                                @click="navigate('providers')"
                                >Soul Gateway</a
                            >
                        </div>
                        <div class="navbar-center hidden lg:flex">
                            <ul class="menu menu-horizontal px-1">
                                <template x-for="p in pages" :key="p.id">
                                    <li>
                                        <a
                                            :class="{'active': page === p.id}"
                                            @click="navigate(p.id)"
                                            x-text="p.label"
                                        ></a>
                                    </li>
                                </template>
                            </ul>
                        </div>
                        <div class="navbar-end">
                            <div class="flex items-center gap-2">
                                <div
                                    class="badge badge-sm"
                                    :class="wsConnected ? 'badge-success' : 'badge-error'"
                                    x-text="wsConnected ? 'Live' : 'Offline'"
                                ></div>
                                <div
                                    class="text-xs opacity-50"
                                    x-show="streamMode"
                                    x-text="streamMode === 'ws' ? 'WS' : 'SSE'"
                                ></div>
                                <button
                                    class="btn btn-ghost btn-xs"
                                    @click="logout()"
                                >
                                    Logout
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Main content -->
                    <div class="container mx-auto p-4">
                        <!-- Logs Page -->
                        <div x-show="page === 'logs'" x-cloak>
                            <div x-data="logsPage()" x-init="init()">
                                <div class="flex gap-4 h-[calc(100vh-10rem)]">
                                    <!-- Keys Panel -->
                                    <div
                                        class="w-64 flex-shrink-0 flex flex-col"
                                    >
                                        <div
                                            class="card bg-base-100 shadow flex-1 overflow-y-auto"
                                        >
                                            <div class="p-2 text-sm">
                                                <template
                                                    x-for="key in keys"
                                                    :key="key.list_id"
                                                >
                                                    <div
                                                        class="flex items-center gap-2 cursor-pointer px-2 py-1.5 rounded transition-colors"
                                                        :class="selectedKey?.list_id === key.list_id ? 'bg-primary/20 hover:bg-primary/20' : 'hover:bg-base-200'"
                                                        @click="selectKey(key)"
                                                    >
                                                        <div
                                                            class="flex-1 min-w-0"
                                                        >
                                                            <div
                                                                class="font-medium text-xs truncate"
                                                                x-text="key.key_label || key.key_hint || key.api_key_id?.slice(0,8)"
                                                            ></div>
                                                            <div
                                                                class="text-xs opacity-40 font-mono"
                                                                x-text="key.key_hint || ''"
                                                            ></div>
                                                        </div>
                                                        <span
                                                            class="badge badge-ghost badge-xs"
                                                            x-text="Number(key.request_count).toLocaleString()"
                                                        ></span>
                                                    </div>
                                                </template>
                                                <div
                                                    x-show="keys.length === 0"
                                                    class="text-center opacity-50 py-4"
                                                >
                                                    No data
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- Log Detail Panel -->
                                    <div class="flex-1 flex flex-col">
                                        <div
                                            class="card bg-base-100 shadow flex-1 overflow-hidden"
                                        >
                                            <div
                                                class="card-body p-0 flex flex-col h-full"
                                            >
                                                <!-- Header: search + time filter -->
                                                <div
                                                    class="px-4 py-2 border-b border-base-300 flex items-center gap-2 flex-wrap"
                                                >
                                                    <input
                                                        type="text"
                                                        class="input input-bordered input-xs w-48"
                                                        placeholder="Search model, agent, content..."
                                                        x-model="keyword"
                                                        @keydown.enter="onSearch()"
                                                        @input="if (!keyword.trim()) onSearch()"
                                                        @change="onSearch()"
                                                    />
                                                    <span
                                                        class="text-xs opacity-50"
                                                        x-text="logsTotal + ' requests'"
                                                    ></span>
                                                    <span
                                                        x-show="logsLoading"
                                                        class="loading loading-spinner loading-xs opacity-60"
                                                    ></span>
                                                    <div class="flex-1"></div>
                                                    <!-- Time range -->
                                                    <div class="join">
                                                        <button
                                                            class="join-item btn btn-xs"
                                                            :class="timeRange === 'day' ? 'btn-primary' : ''"
                                                            @click="timeRange = 'day'; onTimeChange()"
                                                        >
                                                            Day
                                                        </button>
                                                        <button
                                                            class="join-item btn btn-xs"
                                                            :class="timeRange === 'week' ? 'btn-primary' : ''"
                                                            @click="timeRange = 'week'; onTimeChange()"
                                                        >
                                                            Week
                                                        </button>
                                                        <button
                                                            class="join-item btn btn-xs"
                                                            :class="timeRange === 'month' ? 'btn-primary' : ''"
                                                            @click="timeRange = 'month'; onTimeChange()"
                                                        >
                                                            Month
                                                        </button>
                                                        <button
                                                            class="join-item btn btn-xs"
                                                            :class="timeRange === 'custom' ? 'btn-primary' : ''"
                                                            @click="timeRange = 'custom'"
                                                        >
                                                            Custom
                                                        </button>
                                                    </div>
                                                    <template
                                                        x-if="timeRange === 'custom'"
                                                    >
                                                        <div
                                                            class="flex gap-1 items-center"
                                                        >
                                                            <input
                                                                type="date"
                                                                class="input input-bordered input-xs"
                                                                x-model="customFrom"
                                                                @change="onTimeChange()"
                                                            />
                                                            <span
                                                                class="text-xs"
                                                                >to</span
                                                            >
                                                            <input
                                                                type="date"
                                                                class="input input-bordered input-xs"
                                                                x-model="customTo"
                                                                @change="onTimeChange()"
                                                            />
                                                        </div>
                                                    </template>
                                                </div>
                                                <!-- Active filter chips -->
                                                <div
                                                    class="px-4 py-1 flex gap-1 flex-wrap"
                                                    x-show="activeFilters.length > 0"
                                                >
                                                    <template
                                                        x-for="f in activeFilters"
                                                        :key="f.key"
                                                    >
                                                        <span
                                                            class="badge badge-info badge-sm gap-1"
                                                        >
                                                            <span
                                                                x-text="f.label"
                                                            ></span>
                                                            <button
                                                                class="text-xs font-bold"
                                                                @click="removeFilter(f.key)"
                                                            >
                                                                &times;
                                                            </button>
                                                        </span>
                                                    </template>
                                                </div>
                                                <div
                                                    class="overflow-auto flex-1"
                                                >
                                                    <table
                                                        class="table table-xs table-zebra"
                                                    >
                                                        <thead
                                                            class="sticky top-0 bg-base-100 z-10"
                                                        >
                                                            <tr>
                                                                <th
                                                                    colspan="10"
                                                                    class="p-0"
                                                                >
                                                                    <div
                                                                        class="flex items-center px-3 py-2"
                                                                    >
                                                                        <div
                                                                            class="w-5"
                                                                        ></div>
                                                                        <div
                                                                            class="flex-1 flex items-center gap-0"
                                                                        >
                                                                            <div
                                                                                class="resizable-col text-xs cursor-pointer select-none flex items-center gap-1"
                                                                                :style="{width: cw('time')}"
                                                                                @click="setSort('started_at')"
                                                                            >
                                                                                Time
                                                                                <span
                                                                                    x-show="sortCol === 'started_at'"
                                                                                    x-text="sortDir === 'asc' ? '\u25B2' : '\u25BC'"
                                                                                    class="text-primary text-[10px]"
                                                                                ></span>
                                                                                <div
                                                                                    class="col-resize-handle"
                                                                                    @mousedown="startResize('time', $event)"
                                                                                ></div>
                                                                            </div>
                                                                            <div
                                                                                class="resizable-col text-xs cursor-pointer select-none flex items-center gap-1"
                                                                                :style="{width: cw('model')}"
                                                                                @click="setSort('resolved_model')"
                                                                            >
                                                                                Model
                                                                                <span
                                                                                    x-show="sortCol === 'resolved_model'"
                                                                                    x-text="sortDir === 'asc' ? '\u25B2' : '\u25BC'"
                                                                                    class="text-primary text-[10px]"
                                                                                ></span>
                                                                                <div
                                                                                    class="col-resize-handle"
                                                                                    @mousedown="startResize('model', $event)"
                                                                                ></div>
                                                                            </div>
                                                                            <div
                                                                                class="resizable-col text-xs flex items-center"
                                                                                :style="{width: cw('agent')}"
                                                                            >
                                                                                Agent
                                                                                <div
                                                                                    class="col-resize-handle"
                                                                                    @mousedown="startResize('agent', $event)"
                                                                                ></div>
                                                                            </div>
                                                                            <div
                                                                                class="resizable-col text-xs flex items-center"
                                                                                :style="{width: cw('session')}"
                                                                            >
                                                                                Session
                                                                                <div
                                                                                    class="col-resize-handle"
                                                                                    @mousedown="startResize('session', $event)"
                                                                                ></div>
                                                                            </div>
                                                                            <div
                                                                                class="resizable-col text-right text-xs cursor-pointer select-none flex items-center justify-end gap-1"
                                                                                :style="{width: cw('latency')}"
                                                                                @click="setSort('latency_ms')"
                                                                            >
                                                                                Latency
                                                                                <span
                                                                                    x-show="sortCol === 'latency_ms'"
                                                                                    x-text="sortDir === 'asc' ? '\u25B2' : '\u25BC'"
                                                                                    class="text-primary text-[10px]"
                                                                                ></span>
                                                                                <div
                                                                                    class="col-resize-handle"
                                                                                    @mousedown="startResize('latency', $event)"
                                                                                ></div>
                                                                            </div>
                                                                            <div
                                                                                class="resizable-col text-right text-xs cursor-pointer select-none flex items-center justify-end gap-1"
                                                                                :style="{width: cw('tokens')}"
                                                                                @click="setSort('total_tokens')"
                                                                            >
                                                                                Tokens
                                                                                <span
                                                                                    x-show="sortCol === 'total_tokens'"
                                                                                    x-text="sortDir === 'asc' ? '\u25B2' : '\u25BC'"
                                                                                    class="text-primary text-[10px]"
                                                                                ></span>
                                                                                <div
                                                                                    class="col-resize-handle"
                                                                                    @mousedown="startResize('tokens', $event)"
                                                                                ></div>
                                                                            </div>
                                                                            <div
                                                                                class="resizable-col text-right text-xs cursor-pointer select-none flex items-center justify-end gap-1"
                                                                                :style="{width: cw('cost')}"
                                                                                @click="setSort('total_cost')"
                                                                            >
                                                                                Cost
                                                                                <span
                                                                                    x-show="sortCol === 'total_cost'"
                                                                                    x-text="sortDir === 'asc' ? '\u25B2' : '\u25BC'"
                                                                                    class="text-primary text-[10px]"
                                                                                ></span>
                                                                                <div
                                                                                    class="col-resize-handle"
                                                                                    @mousedown="startResize('cost', $event)"
                                                                                ></div>
                                                                            </div>
                                                                            <div
                                                                                class="resizable-col text-xs text-center flex items-center justify-center"
                                                                                :style="{width: cw('cache')}"
                                                                            >
                                                                                Cache
                                                                                <div
                                                                                    class="col-resize-handle"
                                                                                    @mousedown="startResize('cache', $event)"
                                                                                ></div>
                                                                            </div>
                                                                            <div
                                                                                class="text-xs pl-2"
                                                                                :style="{width: cw('status')}"
                                                                            >
                                                                                Status
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            <template
                                                                x-for="log in selectedLogs"
                                                                :key="log.id"
                                                            >
                                                                <tr>
                                                                    <td
                                                                        colspan="10"
                                                                        class="p-0"
                                                                    >
                                                                        <div
                                                                            class="flex items-center cursor-pointer hover:bg-base-200 px-3 py-1.5"
                                                                            @click="toggleDetail(log)"
                                                                        >
                                                                            <div
                                                                                class="w-5"
                                                                            >
                                                                                <svg
                                                                                    :class="{'rotate-90': expandedDetail === log.id}"
                                                                                    class="w-3 h-3 transition-transform"
                                                                                    fill="none"
                                                                                    viewBox="0 0 24 24"
                                                                                    stroke="currentColor"
                                                                                >
                                                                                    <path
                                                                                        stroke-linecap="round"
                                                                                        stroke-linejoin="round"
                                                                                        stroke-width="2"
                                                                                        d="M9 5l7 7-7 7"
                                                                                    />
                                                                                </svg>
                                                                            </div>
                                                                            <div
                                                                                class="flex-1 flex items-center gap-0"
                                                                            >
                                                                                <div
                                                                                    class="text-xs truncate flex-shrink-0"
                                                                                    :style="{width: cw('time')}"
                                                                                    x-text="formatTime(log.started_at)"
                                                                                ></div>
                                                                                <div
                                                                                    class="font-mono text-xs truncate flex-shrink-0"
                                                                                    :style="{width: cw('model')}"
                                                                                    x-text="log.resolved_model || log.requested_model || '-'"
                                                                                ></div>
                                                                                <div
                                                                                    class="text-xs truncate flex-shrink-0 cursor-pointer hover:underline"
                                                                                    :style="{width: cw('agent')}"
                                                                                    x-text="log.agent_name || '-'"
                                                                                    @click.stop="log.agent_name && addFilter('agent_name', log.agent_name)"
                                                                                ></div>
                                                                                <div
                                                                                    class="text-xs font-mono opacity-50 truncate flex-shrink-0 cursor-pointer hover:underline"
                                                                                    :style="{width: cw('session')}"
                                                                                    x-text="log.session_id ? log.session_id.slice(0,8) : '-'"
                                                                                    @click.stop="log.session_id && addFilter('session_id', log.session_id)"
                                                                                ></div>
                                                                                <div
                                                                                    class="text-right text-xs flex-shrink-0"
                                                                                    :style="{width: cw('latency')}"
                                                                                    x-text="log.latency_ms ? log.latency_ms + 'ms' : '-'"
                                                                                ></div>
                                                                                <div
                                                                                    class="text-right text-xs flex-shrink-0"
                                                                                    :style="{width: cw('tokens')}"
                                                                                    x-text="formatTokens(log.total_tokens)"
                                                                                ></div>
                                                                                <div
                                                                                    class="text-right text-xs flex-shrink-0"
                                                                                    :style="{width: cw('cost')}"
                                                                                    x-text="formatCost(log.total_cost)"
                                                                                ></div>
                                                                                <div
                                                                                    class="text-center flex-shrink-0 cursor-pointer"
                                                                                    :style="{width: cw('cache')}"
                                                                                    @click.stop="addFilter('cache_hit', !!log.cache_hit)"
                                                                                >
                                                                                    <span
                                                                                        class="badge badge-xs"
                                                                                        :class="log.cache_hit ? 'badge-success' : 'badge-ghost'"
                                                                                        x-text="log.cache_hit ? 'HIT' : 'MISS'"
                                                                                    ></span>
                                                                                </div>
                                                                                <div
                                                                                    class="pl-2 flex-shrink-0"
                                                                                    :style="{width: cw('status')}"
                                                                                >
                                                                                    <span
                                                                                        x-show="log.error_type"
                                                                                        class="badge badge-error badge-xs"
                                                                                        x-text="log.error_type"
                                                                                    ></span>
                                                                                    <span
                                                                                        x-show="!log.error_type && log.status_code === 200"
                                                                                        class="badge badge-success badge-xs"
                                                                                        >OK</span
                                                                                    >
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                        <!-- Expanded Detail -->
                                                                        <div
                                                                            x-show="expandedDetail === log.id"
                                                                            x-transition
                                                                            class="px-8 py-4 bg-base-200 border-t border-base-300"
                                                                        >
                                                                            <template
                                                                                x-if="log._detail"
                                                                            >
                                                                                <div
                                                                                    class="flex flex-col gap-4"
                                                                                >
                                                                                    <div>
                                                                                        <h4
                                                                                            class="font-bold mb-2 text-xs"
                                                                                        >
                                                                                            Request
                                                                                        </h4>
                                                                                        <template
                                                                                            x-if="(log._detail.request_messages || []).length > 0"
                                                                                        >
                                                                                            <div
                                                                                                class="flex flex-col gap-2 max-h-96 overflow-auto"
                                                                                            >
                                                                                                <template
                                                                                                    x-for="(msg, mi) in formatMessages(log._detail.request_messages)"
                                                                                                    :key="mi"
                                                                                                >
                                                                                                    <div
                                                                                                        class="rounded-lg border border-base-300 bg-base-100 p-3"
                                                                                                    >
                                                                                                        <div
                                                                                                            class="mb-1"
                                                                                                        >
                                                                                                            <span
                                                                                                                class="badge badge-sm"
                                                                                                                :class="msg.role === 'system' ? 'badge-ghost' : msg.role === 'user' ? 'badge-info' : msg.role === 'assistant' ? 'badge-success' : 'badge-secondary'"
                                                                                                                x-text="msg.role"
                                                                                                            ></span>
                                                                                                        </div>
                                                                                                        <template
                                                                                                            x-if="!msg.isLong"
                                                                                                            ><div
                                                                                                                class="sg-md text-xs"
                                                                                                                x-html="msg.html"
                                                                                                            ></div
                                                                                                        ></template>
                                                                                                        <template
                                                                                                            x-if="msg.isLong"
                                                                                                            ><div>
                                                                                                                <div
                                                                                                                    x-show="!msg._expanded"
                                                                                                                    class="text-xs opacity-70"
                                                                                                                    x-text="msg.raw.slice(0, 200) + '...'"
                                                                                                                ></div>
                                                                                                                <div
                                                                                                                    x-show="msg._expanded"
                                                                                                                    class="sg-md text-xs"
                                                                                                                    x-html="msg.html"
                                                                                                                ></div>
                                                                                                                <button
                                                                                                                    class="btn btn-ghost btn-xs mt-1"
                                                                                                                    @click.stop="msg._expanded = !msg._expanded"
                                                                                                                    x-text="msg._expanded ? 'Collapse' : 'Expand (' + msg.raw.length + ' chars)'"
                                                                                                                ></button></div
                                                                                                        ></template>
                                                                                                    </div>
                                                                                                </template>
                                                                                            </div>
                                                                                        </template>
                                                                                        <template
                                                                                            x-if="(log._detail.request_messages || []).length === 0"
                                                                                        >
                                                                                            <div
                                                                                                class="sg-md text-xs max-h-72 overflow-auto rounded-lg border border-base-300 bg-base-100 p-3"
                                                                                                x-html="renderContent(log._detail.request_content) || '(empty)'"
                                                                                            ></div>
                                                                                        </template>
                                                                                    </div>
                                                                                    <div>
                                                                                        <h4
                                                                                            class="font-bold mb-2 text-xs"
                                                                                        >
                                                                                            Response
                                                                                        </h4>
                                                                                        <div
                                                                                            class="sg-md text-xs max-h-72 overflow-auto rounded-lg border border-base-300 bg-base-100 p-3"
                                                                                            x-html="renderContent(log._detail.response_content) || '(empty)'"
                                                                                        ></div>
                                                                                    </div>
                                                                                    <div>
                                                                                        <div
                                                                                            class="stats stats-horizontal shadow w-full text-xs"
                                                                                        >
                                                                                            <div
                                                                                                class="stat py-2"
                                                                                            >
                                                                                                <div
                                                                                                    class="stat-title text-xs"
                                                                                                >
                                                                                                    Input
                                                                                                    Tokens
                                                                                                </div>
                                                                                                <div
                                                                                                    class="stat-value text-sm"
                                                                                                    x-text="log._detail.prompt_tokens || 0"
                                                                                                ></div>
                                                                                            </div>
                                                                                            <div
                                                                                                class="stat py-2"
                                                                                            >
                                                                                                <div
                                                                                                    class="stat-title text-xs"
                                                                                                >
                                                                                                    Output
                                                                                                    Tokens

                                                                        class="badge badge-xs badge-warning whitespace-nowrap"

                                                                        reauth</span

                                                            <td>

                                                                        Remove

                                                            </td>

                                                            Device Code:

                                                            class="flex gap-2 mt-2"
                                                        >
                                                            <button

                                                                port that isn't
                                                                running. Copy
                                                                the FULL URL
