name: Deploy Soul Gateway

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - stop
          - status

jobs:
  deploy-soul-gateway:
    name: Deploy Soul Gateway to Remote Server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.REMOTE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} \
            "echo 'SSH connection OK'"

      # ─── STATUS ─────────────────────────────────────────────────
      - name: Handle status check
        if: inputs.action == 'status'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} << 'EOF'
          echo "=== Ploinky Status ==="
          cd ~/soulGateway
          ploinky status

          echo ""
          echo "=== Soul Gateway Health Check ==="
          curl -s http://localhost:8042/healthz 2>/dev/null || echo "Soul Gateway not reachable on port 8042"

          echo ""
          echo "=== Container Logs (last 20 lines) ==="
          CONTAINER=$(podman ps --filter "name=soul-gateway" --format "{{.Names}}" 2>/dev/null | head -1)
          if [ -n "$CONTAINER" ]; then
            podman logs --tail 20 "$CONTAINER" 2>/dev/null
          else
            echo "No soul-gateway container found"
          fi

          echo ""
          echo "=== Postgres Container ==="
          podman ps --filter "name=postgres" --format "table {{.Names}}\t{{.Status}}" 2>/dev/null || echo "No postgres container found"
          EOF

      # ─── STOP ───────────────────────────────────────────────────
      - name: Handle stop
        if: inputs.action == 'stop'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} << 'EOF'
          cd ~/soulGateway
          echo "Stopping soul-gateway..."
          ploinky stop soul-gateway 2>&1 || echo "Stop failed - agent may not be running"
          echo ""
          ploinky status
          EOF

      # ─── RESTART ────────────────────────────────────────────────
      - name: Handle restart
        if: inputs.action == 'restart'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} << 'EOF'
          cd ~/soulGateway
          ploinky restart soul-gateway || echo "Restart failed - agent may not be enabled yet"
          sleep 5
          echo ""
          echo "=== Post-restart Status ==="
          ploinky status
          echo ""
          curl -s http://localhost:8042/healthz 2>/dev/null || echo "Soul Gateway not reachable yet"
          EOF

      # ─── DEPLOY ─────────────────────────────────────────────────
      - name: Deploy - Write secrets env file
        if: inputs.action == 'deploy' || github.event_name == 'push'
        run: |
          cat > /tmp/soul_env << ENVEOF
          PGPASSWORD=${{ secrets.SG_PGPASSWORD }}
          DEFAULT_PROXY_API_KEY=${{ secrets.SG_DEFAULT_PROXY_API_KEY }}
          DASHBOARD_PASSWORD=${{ secrets.SG_DASHBOARD_PASSWORD }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          PLOINKY_MASTER_KEY=${{ secrets.PLOINKY_MASTER_KEY }}
          ENVEOF

      - name: Deploy - SCP secrets to remote
        if: inputs.action == 'deploy' || github.event_name == 'push'
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            /tmp/soul_env \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }}:/tmp/soul_env

      - name: Deploy - Run remote setup
        if: inputs.action == 'deploy' || github.event_name == 'push'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} bash -s << 'DEPLOY_SCRIPT'
          set -e

          # Source secrets
          while IFS='=' read -r key value; do
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            [ -n "$key" ] && export "$key=$value"
          done < /tmp/soul_env
          rm -f /tmp/soul_env

          WORKSPACE="$HOME/soulGateway"
          PROXIES_REPO="https://github.com/PloinkyRepos/proxies.git"
          BASIC_REPO="https://github.com/PloinkyRepos/Basic.git"
          CODE_DIR="$HOME/code"
          SOUL_DATABASE="soul_gateway_v2"

          resolve_ploinky() {
            if command -v ploinky >/dev/null 2>&1; then
              command -v ploinky
              return 0
            fi
            if [ -x "$HOME/.local/bin/ploinky" ]; then
              printf '%s\n' "$HOME/.local/bin/ploinky"
              return 0
            fi
            if [ -x "$HOME/ploinky/bin/ploinky" ]; then
              printf '%s\n' "$HOME/ploinky/bin/ploinky"
              return 0
            fi
            if [ -x "$HOME/proxy-gateway/ploinky/bin/ploinky" ]; then
              printf '%s\n' "$HOME/proxy-gateway/ploinky/bin/ploinky"
              return 0
            fi
            return 1
          }

          PLOINKY="$(resolve_ploinky)" || {
            echo "ERROR: ploinky is not installed on the remote host."
            exit 1
          }
          PLOINKY_BIN=$(readlink -f "$PLOINKY" 2>/dev/null || printf '%s\n' "$PLOINKY")
          PLOINKY_DIR=$(cd "$(dirname "$PLOINKY_BIN")/.." 2>/dev/null && pwd) || true

          echo "=========================================="
          echo "  Soul Gateway - Deploy"
          echo "=========================================="
          echo ""

          # Clone or pull repos
          if [ -d "$CODE_DIR/proxies/.git" ]; then
            echo "Pulling latest proxies..."
            cd "$CODE_DIR/proxies" && git fetch origin main && git reset --hard origin/main
          else
            echo "Cloning proxies repo..."
            mkdir -p "$CODE_DIR"
            git clone "$PROXIES_REPO" "$CODE_DIR/proxies"
          fi

          if [ -d "$CODE_DIR/basic/.git" ]; then
            echo "Pulling latest basic..."
            cd "$CODE_DIR/basic" && git fetch origin main && git reset --hard origin/main
          else
            echo "Cloning basic repo..."
            git clone "$BASIC_REPO" "$CODE_DIR/basic"
          fi

          # Create workspace
          mkdir -p "$WORKSPACE"
          cd "$WORKSPACE"

          # Register repos with ploinky
          mkdir -p "$WORKSPACE/.ploinky/repos"
          ln -sfn "$CODE_DIR/proxies" "$WORKSPACE/.ploinky/repos/proxies"
          ln -sfn "$CODE_DIR/basic" "$WORKSPACE/.ploinky/repos/basic"

          if [ ! -f "$WORKSPACE/.ploinky/enabled_repos.json" ]; then
            echo '["basic","proxies"]' > "$WORKSPACE/.ploinky/enabled_repos.json"
          fi

          echo "Updating Ploinky, installed repos, and achillesAgentLib..."
          if ! env PLOINKY_MASTER_KEY="$PLOINKY_MASTER_KEY" "$PLOINKY" update; then
            echo "Initial ploinky update failed; retrying once in case Ploinky self-updated during this run..."
            if ! env PLOINKY_MASTER_KEY="$PLOINKY_MASTER_KEY" "$PLOINKY" update; then
              echo "WARNING: broad ploinky update failed. Continuing because this deploy already reset proxies/basic before starting Soul Gateway."
            fi
          fi

          if [ -n "$PLOINKY_DIR" ] && [ -f "$PLOINKY_DIR/package.json" ]; then
            npm install --ignore-scripts --prefix "$PLOINKY_DIR"
            ACHILLES_DIR="$PLOINKY_DIR/node_modules/achillesAgentLib"
            if [ -d "$ACHILLES_DIR/.git" ]; then
              git -C "$ACHILLES_DIR" pull --rebase --autostash
            else
              rm -rf "$ACHILLES_DIR"
              git clone https://github.com/OutfinityResearch/achillesAgentLib.git "$ACHILLES_DIR"
            fi
          fi

          # Configure env vars
          echo "Configuring env vars..."
          "$PLOINKY" var PGHOST "10.0.2.2"  # slirp4netns gateway → host loopback
          "$PLOINKY" var PGPORT "5432"
          "$PLOINKY" var PGUSER "postgres"
          "$PLOINKY" var PGPASSWORD "$PGPASSWORD"
          "$PLOINKY" var PGDATABASE "$SOUL_DATABASE"
          "$PLOINKY" var DEFAULT_PROXY_API_KEY "$DEFAULT_PROXY_API_KEY"
          if [ -n "$OPENROUTER_API_KEY" ]; then
            "$PLOINKY" var OPENROUTER_API_KEY "$OPENROUTER_API_KEY"
          fi
          # DASHBOARD_PASSWORD must be a global var (ploinky var) because .secrets
          # takes precedence over ploinky expose, and containers inherit from .secrets
          if [ -n "$DASHBOARD_PASSWORD" ]; then
            "$PLOINKY" var DASHBOARD_PASSWORD "$DASHBOARD_PASSWORD"
          fi
          # Stop and clean existing
          if podman ps -a --format '{{.Names}}' 2>/dev/null | grep -q "soul-gateway.*soulGateway"; then
            echo "Stopping existing soul-gateway..."
            "$PLOINKY" stop soul-gateway 2>&1 || true
            "$PLOINKY" clean soul-gateway 2>&1 || true
          fi

          # Start soul-gateway (starts postgres too)
          mkdir -p "$WORKSPACE/logs"
          echo "Starting soul-gateway..."
          "$PLOINKY" start soul-gateway > "$WORKSPACE/logs/deploy.log" 2>&1

          # Wait for postgres to be ready, then patch pg_hba.conf to trust all connections
          # This permanently prevents password mismatch issues across container recreations
          echo "Waiting for postgres..."
          PG_CONTAINER=""
          for i in $(seq 1 20); do
            PG_CONTAINER=$(podman ps --filter "name=postgres" --format "{{.Names}}" 2>/dev/null | head -1)
            if [ -n "$PG_CONTAINER" ] && podman exec "$PG_CONTAINER" psql -U postgres -c "SELECT 1" >/dev/null 2>&1; then
              echo "Postgres is ready."
              break
            fi
            sleep 1
          done

          if [ -n "$PG_CONTAINER" ]; then
            # Ensure pg_hba.conf uses scram-sha-256 (undo any previous trust patch)
            podman exec "$PG_CONTAINER" sed -i 's/host all all all trust/host all all all scram-sha-256/' \
              /var/lib/postgresql/data/pgdata/pg_hba.conf 2>/dev/null || true
            podman exec "$PG_CONTAINER" psql -U postgres -c "SELECT pg_reload_conf();" >/dev/null 2>&1 || true
            # Set the postgres password to match the secret (handles existing data dirs)
            podman exec "$PG_CONTAINER" psql -U postgres -c "ALTER USER postgres PASSWORD '$PGPASSWORD';" >/dev/null 2>&1 || true
            if [ "$(podman exec "$PG_CONTAINER" psql -U postgres -tAc "SELECT 1 FROM pg_database WHERE datname = '$SOUL_DATABASE'" | tr -d '[:space:]')" != "1" ]; then
              podman exec "$PG_CONTAINER" createdb -U postgres "$SOUL_DATABASE"
              echo "Created database $SOUL_DATABASE."
            fi
            echo "Postgres auth secured with scram-sha-256."
          fi

          SOUL_CONTAINER=$(podman ps -a --filter "name=soul-gateway" --format "{{.Names}}" 2>/dev/null | head -1)
          if [ -n "$SOUL_CONTAINER" ]; then
            SOUL_STATUS=$(podman inspect "$SOUL_CONTAINER" --format "{{.State.Status}}" 2>/dev/null || true)
            if [ "$SOUL_STATUS" != "running" ]; then
              echo "Starting soul-gateway container after database setup..."
              podman start "$SOUL_CONTAINER" >/dev/null 2>&1 || true
            fi
          fi

          # Health check
          echo "Waiting for startup..."
          for i in $(seq 1 150); do
            sleep 2
            if curl -sf http://localhost:8042/healthz > /dev/null 2>&1; then
              echo ""
              echo "Soul Gateway is healthy!"
              curl -s http://localhost:8042/healthz
              echo ""

              echo ""
              echo "=========================================="
              echo "  Deployment Success"
              echo "=========================================="
              "$PLOINKY" status
              exit 0
            fi
            echo "  Attempt $i/150..."
          done

          echo "ERROR: Soul Gateway failed to start"
          echo "=== Deploy log ==="
          tail -30 "$WORKSPACE/logs/deploy.log" 2>/dev/null || true
          echo "=== Container log ==="
          podman logs --tail 30 "$(podman ps -a --format '{{.Names}}' | grep soul-gateway | head -1)" 2>&1 || true
          exit 1
          DEPLOY_SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key /tmp/soul_env
