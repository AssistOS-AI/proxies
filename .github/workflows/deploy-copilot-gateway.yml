name: Deploy Copilot Gateway (disabled under runtime v5)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reject-legacy-direct-deploy:
    name: Reject missing v5 agent artifact
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed before remote access
        run: |
          set -euo pipefail
          echo '::error::copilot-gateway has no tracked runtime-v5 manifest in this repository. Stable physical-host port 4141 and mutable remote-container deployment are forbidden; add a pinned agent artifact, declared Router service, and separately reviewed authenticated Ploinky operator workflow before activation.'
          exit 1
