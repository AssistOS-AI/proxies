name: Deploy Search Gateway

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Deployment action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - restart
          - stop
          - status

jobs:
  deploy-search-gateway:
    name: Deploy Search Gateway to Remote Server
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.REMOTE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} \
            "echo 'SSH connection OK'"

      # ─── STATUS ─────────────────────────────────────────────────
      - name: Handle status check
        if: inputs.action == 'status'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} << 'EOF'
          echo "=== Search Gateway Health Check ==="
          curl -s http://localhost:8043/health 2>/dev/null || echo "Search Gateway not reachable on port 8043"
          echo ""
          echo "=== Models ==="
          curl -s http://localhost:8043/v1/models 2>/dev/null || echo "Could not fetch models"
          EOF

      # ─── STOP ───────────────────────────────────────────────────
      - name: Handle stop
        if: inputs.action == 'stop'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} << 'EOF'
          cd ~/soulGateway
          echo "Stopping search-gateway..."
          ploinky stop search-gateway 2>&1 || echo "Stop failed - agent may not be running"
          EOF

      # ─── RESTART ────────────────────────────────────────────────
      - name: Handle restart
        if: inputs.action == 'restart'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} << 'EOF'
          cd ~/soulGateway
          ploinky restart search-gateway || echo "Restart failed - agent may not be enabled yet"
          sleep 5
          curl -s http://localhost:8043/health 2>/dev/null || echo "Search Gateway not reachable yet"
          EOF

      # ─── DEPLOY ─────────────────────────────────────────────────
      - name: Deploy - Write secrets env file
        if: inputs.action == 'deploy'
        run: |
          cat > /tmp/search_env << ENVEOF
          PGPASSWORD=${{ secrets.SG_PGPASSWORD }}
          DASHBOARD_PASSWORD=${{ secrets.SG_DASHBOARD_PASSWORD }}
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY=${{ secrets.BRAVE_API_KEY }}
          EXA_API_KEY=${{ secrets.EXA_API_KEY }}
          JINA_API_KEY=${{ secrets.JINA_API_KEY }}
          SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}
          SOUL_GATEWAY_API_KEY=${{ secrets.SG_DEFAULT_PROXY_API_KEY }}
          ENVEOF

      - name: Deploy - SCP secrets to remote
        if: inputs.action == 'deploy'
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            /tmp/search_env \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }}:/tmp/search_env

      - name: Deploy - Run remote setup
        if: inputs.action == 'deploy'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} bash -s << 'DEPLOY_SCRIPT'
          set -e

          # Source secrets
          while IFS='=' read -r key value; do
            key=$(echo "$key" | xargs)
            value=$(echo "$value" | xargs)
            [ -n "$key" ] && export "$key=$value"
          done < /tmp/search_env
          rm -f /tmp/search_env

          WORKSPACE="$HOME/soulGateway"
          CODE_DIR="$HOME/code"

          echo "=========================================="
          echo "  Search Gateway - Deploy"
          echo "=========================================="

          # Pull latest proxies repo (shared with soul-gateway)
          if [ -d "$CODE_DIR/proxies/.git" ]; then
            echo "Pulling latest proxies..."
            cd "$CODE_DIR/proxies" && git fetch origin main && git reset --hard origin/main
          else
            echo "Cloning proxies repo..."
            mkdir -p "$CODE_DIR"
            git clone "https://github.com/PloinkyRepos/proxies.git" "$CODE_DIR/proxies"
          fi

          cd "$WORKSPACE"

          # Ensure repos are linked
          mkdir -p "$WORKSPACE/.ploinky/repos"
          ln -sfn "$CODE_DIR/proxies" "$WORKSPACE/.ploinky/repos/proxies"

          # Configure env vars for search-gateway
          echo "Configuring env vars..."
          ploinky var PGHOST "10.0.2.2"
          ploinky var PGPORT "5432"
          ploinky var PGUSER "postgres"
          ploinky var PGPASSWORD "$PGPASSWORD"
          ploinky var PGDATABASE "postgres"

          if [ -n "$DASHBOARD_PASSWORD" ]; then
            ploinky var DASHBOARD_PASSWORD "$DASHBOARD_PASSWORD"
          fi
          [ -n "$TAVILY_API_KEY" ] && ploinky var TAVILY_API_KEY "$TAVILY_API_KEY"
          [ -n "$BRAVE_API_KEY" ] && ploinky var BRAVE_API_KEY "$BRAVE_API_KEY"
          [ -n "$EXA_API_KEY" ] && ploinky var EXA_API_KEY "$EXA_API_KEY"
          [ -n "$JINA_API_KEY" ] && ploinky var JINA_API_KEY "$JINA_API_KEY"
          [ -n "$SERPER_API_KEY" ] && ploinky var SERPER_API_KEY "$SERPER_API_KEY"
          [ -n "$SOUL_GATEWAY_API_KEY" ] && ploinky var SOUL_GATEWAY_API_KEY "$SOUL_GATEWAY_API_KEY"

          # Stop existing if running
          if podman ps -a --format '{{.Names}}' 2>/dev/null | grep -q "search-gateway"; then
            echo "Stopping existing search-gateway..."
            ploinky stop search-gateway 2>&1 || true
            ploinky clean search-gateway 2>&1 || true
          fi

          # Start search-gateway (postgres should already be running from soul-gateway)
          mkdir -p "$WORKSPACE/logs"
          echo "Starting search-gateway..."
          ploinky start search-gateway > "$WORKSPACE/logs/search-gateway-deploy.log" 2>&1

          # Health check
          echo "Waiting for startup..."
          for i in $(seq 1 30); do
            sleep 2
            if curl -sf http://localhost:8043/health > /dev/null 2>&1; then
              echo ""
              echo "Search Gateway is healthy!"
              curl -s http://localhost:8043/health
              echo ""
              echo ""
              echo "=== Models ==="
              curl -s http://localhost:8043/v1/models
              echo ""
              echo ""
              echo "=========================================="
              echo "  Deployment Success"
              echo "=========================================="
              exit 0
            fi
            echo "  Attempt $i/30..."
          done

          echo "ERROR: Search Gateway failed to start"
          echo "=== Deploy log ==="
          tail -30 "$WORKSPACE/logs/search-gateway-deploy.log" 2>/dev/null || true
          exit 1
          DEPLOY_SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key /tmp/search_env
