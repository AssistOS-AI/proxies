name: Deploy Search Gateway (disabled under runtime v5)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reject-legacy-direct-deploy:
    name: Reject missing v5 agent artifact
    runs-on: ubuntu-latest
    steps:
      - name: Fail closed before remote access
        run: |
          set -euo pipefail
          echo '::error::search-gateway has no tracked runtime-v5 manifest in this repository. Stable physical-host port 8043, plaintext secret staging, and mutable remote deployment are forbidden; use the tracked searchAgent contract or add a separately reviewed pinned Router service and authenticated Ploinky operator workflow.'
          exit 1
