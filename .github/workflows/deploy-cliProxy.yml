name: Manage CLIProxyAPI Gateway (runtime v5)

on:
  workflow_dispatch:
    inputs:
      action:
        description: V5 operator lifecycle; deploy emits a candidate record but never activates it
        required: true
        default: status
        type: choice
        options:
          - status
          - deploy
          - restart
          - stop

jobs:
  manage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        if: inputs.action != 'deploy'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ vars.REMOTE_HOST }}
        run: |
          set -euo pipefail
          test -n "$SSH_PRIVATE_KEY"
          test -n "$REMOTE_HOST"
          install -m 700 -d ~/.ssh
          install -m 600 /dev/null ~/.ssh/deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Status
        if: inputs.action == 'status'
        env:
          REMOTE_HOST: ${{ vars.REMOTE_HOST }}
          REMOTE_USER: ${{ vars.REMOTE_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$REMOTE_USER@$REMOTE_HOST" <<'EOF'
          set -euo pipefail
          cd ~/proxy-gateway/workspace
          ploinky status
          EOF

      - name: Stop
        if: inputs.action == 'stop'
        env:
          REMOTE_HOST: ${{ vars.REMOTE_HOST }}
          REMOTE_USER: ${{ vars.REMOTE_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$REMOTE_USER@$REMOTE_HOST" <<'EOF'
          set -euo pipefail
          cd ~/proxy-gateway/workspace
          ploinky stop cliproxyapi-gateway
          EOF

      - name: Restart
        if: inputs.action == 'restart'
        env:
          REMOTE_HOST: ${{ vars.REMOTE_HOST }}
          REMOTE_USER: ${{ vars.REMOTE_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "$REMOTE_USER@$REMOTE_HOST" <<'EOF'
          set -euo pipefail
          cd ~/proxy-gateway/workspace
          ploinky restart cliproxyapi-gateway
          ploinky status
          EOF

      - name: Prepare artifact-only v5 deployment candidate
        id: candidate
        if: inputs.action == 'deploy'
        run: |
          set -euo pipefail
          candidate_dir="$RUNNER_TEMP/cliproxyapi-v5-candidate"
          manifest="cliproxyapi-gateway/manifest.json"
          install -d -m 0755 "$candidate_dir"
          {
            echo 'runtime_contract=5'
            echo "repository_revision=$(git rev-parse HEAD)"
            echo 'activation=blocked'
            if test -f "$manifest"; then
              echo 'source_artifact=present'
              echo 'reason=activation requires a separately reviewed authenticated Ploinky operator workflow'
            else
              echo 'source_artifact=missing'
              echo 'reason=cliproxyapi-gateway/manifest.json is not tracked in this repository'
            fi
          } > "$candidate_dir/STATUS"
          if test -f "$manifest"; then
            tar --sort=name --mtime='UTC 1970-01-01' --owner=0 --group=0 --numeric-owner \
              -czf "$candidate_dir/cliproxyapi-gateway.tar.gz" cliproxyapi-gateway
            sha256sum "$candidate_dir/cliproxyapi-gateway.tar.gz" \
              > "$candidate_dir/cliproxyapi-gateway.tar.gz.sha256"
            echo 'candidate_present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'candidate_present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Upload blocked v5 candidate record
        if: inputs.action == 'deploy'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cliproxyapi-v5-candidate-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/cliproxyapi-v5-candidate
          if-no-files-found: error

      - name: Reject unsupported v5 activation
        if: inputs.action == 'deploy'
        run: |
          set -euo pipefail
          if test '${{ steps.candidate.outputs.candidate_present }}' != true; then
            echo '::error::CLIProxyAPI v5 source artifact is absent; no remote files or lifecycle state were changed.'
          else
            echo '::error::CLIProxyAPI activation is unsupported under runtime v5 until an authenticated Ploinky operator workflow is reviewed; the candidate was uploaded but not deployed.'
          fi
          exit 1

      - name: Cleanup SSH key
        if: always() && inputs.action != 'deploy'
        run: rm -f ~/.ssh/deploy_key
