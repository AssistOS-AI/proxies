name: Soul Gateway Admin

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Admin task to run'
        required: true
        type: choice
        options:
          - add-openrouter-models
          - test-openrouter
          - diagnose
          - status

jobs:
  admin:
    name: Run admin task
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.REMOTE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Add OpenRouter models
        if: inputs.task == 'add-openrouter-models'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} bash -s << 'EOF'

          cd ~/soulGateway

          # Set OPENROUTER_API_KEY
          ploinky var OPENROUTER_API_KEY "${{ secrets.OPENROUTER_API_KEY }}"
          echo "OPENROUTER_API_KEY set."

          # Insert models into soul gateway DB
          PG_CONTAINER=$(podman ps --filter "name=postgres" --format "{{.Names}}" 2>/dev/null | head -1)
          if [ -z "$PG_CONTAINER" ]; then
            echo "ERROR: No postgres container found"
            exit 1
          fi

          echo "Inserting OpenRouter models..."
          podman exec "$PG_CONTAINER" psql -U postgres -d postgres -c "
            INSERT INTO soul_gateway.model_configs (name, provider_key, provider_model, mode, input_price, output_price, is_enabled)
            VALUES
              ('deepseek/deepseek-r1-0528', 'openrouter', 'deepseek/deepseek-r1-0528', 'deep', 0.40, 1.75, true),
              ('qwen/qwen3-coder-plus', 'openrouter', 'qwen/qwen3-coder-plus', 'deep', 1.00, 5.00, true),
              ('mistralai/codestral-2508', 'openrouter', 'mistralai/codestral-2508', 'deep', 0.30, 0.90, true),
              ('x-ai/grok-4', 'openrouter', 'x-ai/grok-4', 'deep', 3.00, 15.00, true),
              ('google/gemini-3-pro-preview', 'openrouter', 'google/gemini-3-pro-preview', 'deep', 2.00, 12.00, true),
              ('x-ai/grok-4.1-fast', 'openrouter', 'x-ai/grok-4.1-fast', 'fast', 0.20, 0.50, true)
            ON CONFLICT (name) DO UPDATE SET
              provider_key = EXCLUDED.provider_key,
              provider_model = EXCLUDED.provider_model,
              mode = EXCLUDED.mode,
              input_price = EXCLUDED.input_price,
              output_price = EXCLUDED.output_price,
              is_enabled = EXCLUDED.is_enabled;
          " 2>&1

          echo ""
          echo "=== Models in DB ==="
          podman exec "$PG_CONTAINER" psql -U postgres -d postgres -c \
            "SELECT name, provider_key, provider_model, is_enabled FROM soul_gateway.model_configs ORDER BY name;" 2>&1

          # Restart soul-gateway to pick up new env var
          echo ""
          echo "Restarting soul-gateway..."
          ploinky restart soul-gateway 2>&1 || true

          sleep 5
          curl -s http://localhost:8042/health 2>/dev/null || echo "Not healthy yet"

          echo ""
          echo "=== Available models ==="
          curl -s -H "x-api-key: dummy" http://localhost:8042/v1/models 2>/dev/null || echo "Failed to list models"
          EOF

      - name: Test OpenRouter
        if: inputs.task == 'test-openrouter'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} bash -s << 'EOF'

          cd ~/soulGateway

          echo "=== Stopping and rebuilding container to pick up manifest changes ==="
          ploinky stop soul-gateway 2>&1 || true
          ploinky clean soul-gateway 2>&1 || true
          ploinky start soul-gateway 2>&1 || true
          sleep 10

          echo ""
          echo "=== Health check ==="
          curl -s http://localhost:8042/health 2>/dev/null || echo "Not healthy"

          echo ""
          echo "=== Env check ==="
          ploinky vars 2>/dev/null | grep OPENROUTER || echo "OPENROUTER_API_KEY not set!"

          CONTAINER=$(podman ps --filter "name=soul-gateway" --format "{{.Names}}" 2>/dev/null | head -1)

          # Check env inside container
          echo ""
          echo "=== OPENROUTER_API_KEY in container env ==="
          podman exec "$CONTAINER" sh -c 'echo "KEY_SET=${OPENROUTER_API_KEY:+yes}"' 2>&1

          echo ""
          echo "=== Testing x-ai/grok-4.1-fast ==="
          # Get an API key from the DB
          PG_CONTAINER=$(podman ps --filter "name=postgres" --format "{{.Names}}" 2>/dev/null | head -1)
          API_KEY=$(podman exec "$PG_CONTAINER" psql -U postgres -d postgres -t -c \
            "SELECT key_value FROM soul_gateway.api_keys WHERE is_active = true LIMIT 1;" 2>/dev/null | xargs)

          curl -s --max-time 30 http://localhost:8042/v1/chat/completions \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "x-ai/grok-4.1-fast",
              "messages": [{"role": "user", "content": "Say hi in one word"}],
              "max_tokens": 10,
              "stream": false
            }' 2>&1

          echo ""
          echo "=== Container logs ==="
          podman logs --tail 15 "$CONTAINER" 2>&1 || true
          EOF

      - name: Diagnose provider models
        if: inputs.task == 'diagnose'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} bash -s << 'EOF'

          cd ~/soulGateway

          CONTAINER=$(podman ps --filter "name=soul-gateway" --format "{{.Names}}" 2>/dev/null | head -1)
          if [ -z "$CONTAINER" ]; then
            echo "ERROR: No soul-gateway container found"
            exit 1
          fi
          echo "Container: $CONTAINER"

          echo ""
          echo "=== Env vars in container ==="
          podman exec "$CONTAINER" sh -c '
            echo "AXIOLOGIC_PROXY_API_KEY=${AXIOLOGIC_PROXY_API_KEY:+SET (${#AXIOLOGIC_PROXY_API_KEY} chars)}"
            echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY:+SET (${#OPENROUTER_API_KEY} chars)}"
            echo "DEFAULT_PROXY_API_KEY=${DEFAULT_PROXY_API_KEY:+SET (${#DEFAULT_PROXY_API_KEY} chars)}"
          ' 2>&1

          echo ""
          echo "=== DNS resolution from container ==="
          podman exec "$CONTAINER" sh -c '
            node -e "
              const dns = require(\"dns\");
              dns.lookup(\"proxy.axiologic.dev\", (err, addr) => {
                if (err) console.log(\"DNS FAILED:\", err.message);
                else console.log(\"proxy.axiologic.dev ->\", addr);
              });
            "
          ' 2>&1

          echo ""
          echo "=== Fetch models from axiologic_proxy (proxy.axiologic.dev/v1/models) ==="
          podman exec "$CONTAINER" sh -c '
            node -e "
              (async () => {
                const key = process.env.AXIOLOGIC_PROXY_API_KEY;
                console.log(\"Using API key:\", key ? key.substring(0, 8) + \"...\" : \"(empty)\");
                try {
                  const resp = await fetch(\"https://proxy.axiologic.dev/v1/models\", {
                    headers: key ? { Authorization: \"Bearer \" + key } : {},
                    signal: AbortSignal.timeout(10000)
                  });
                  console.log(\"Status:\", resp.status);
                  const data = await resp.json();
                  const models = data.data || data;
                  console.log(\"Models count:\", Array.isArray(models) ? models.length : \"not an array\");
                  if (Array.isArray(models)) console.log(\"First 5:\", models.slice(0, 5).map(m => m.id || m.name));
                } catch (e) {
                  console.log(\"ERROR:\", e.message);
                }
              })();
            "
          ' 2>&1

          echo ""
          echo "=== Fetch models from openrouter (openrouter.ai/api/v1/models) ==="
          podman exec "$CONTAINER" sh -c '
            node -e "
              (async () => {
                const key = process.env.OPENROUTER_API_KEY;
                console.log(\"Using API key:\", key ? key.substring(0, 8) + \"...\" : \"(empty)\");
                try {
                  const resp = await fetch(\"https://openrouter.ai/api/v1/models\", {
                    headers: key ? { Authorization: \"Bearer \" + key } : {},
                    signal: AbortSignal.timeout(10000)
                  });
                  console.log(\"Status:\", resp.status);
                  const text = await resp.text();
                  console.log(\"Response length:\", text.length);
                  try {
                    const data = JSON.parse(text);
                    const models = data.data || data;
                    console.log(\"Models count:\", Array.isArray(models) ? models.length : \"not an array\");
                  } catch(e) {
                    console.log(\"First 200 chars:\", text.substring(0, 200));
                  }
                } catch (e) {
                  console.log(\"ERROR:\", e.message);
                }
              })();
            "
          ' 2>&1

          echo ""
          echo "=== LLMConfig.json providers ==="
          podman exec "$CONTAINER" sh -c '
            node -e "
              const cfg = require(\"/code/node_modules/achillesAgentLib/LLMConfig.json\");
              Object.entries(cfg.providers).forEach(([k,v]) => {
                console.log(k + \": \" + v.baseURL + \" (key: \" + v.apiKeyEnv + \")\");
              });
            "
          ' 2>&1

          echo ""
          echo "=== Container logs (last 20 lines) ==="
          podman logs --tail 20 "$CONTAINER" 2>&1 || true
          EOF

      - name: Status
        if: inputs.task == 'status'
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            ${{ vars.REMOTE_USER }}@${{ vars.REMOTE_HOST }} bash -s << 'EOF'
          cd ~/soulGateway
          ploinky status
          echo ""
          ploinky vars
          echo ""
          PG_CONTAINER=$(podman ps --filter "name=postgres" --format "{{.Names}}" 2>/dev/null | head -1)
          podman exec "$PG_CONTAINER" psql -U postgres -d postgres -c \
            "SELECT name, provider_key, provider_model, is_enabled FROM soul_gateway.model_configs ORDER BY name;" 2>&1
          EOF

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
