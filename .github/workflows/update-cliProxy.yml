name: Update CLIProxyAPI (disabled under runtime v5)

on:
  workflow_dispatch:

jobs:
  reject-in-place-update:
    name: Reject mutable in-container update
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Fail closed before remote access
        run: |
          set -euo pipefail
          echo '::error::Runtime v5 forbids mutable in-container source updates and direct private-port health checks. Publish and pin an immutable agent image, then use a separately reviewed authenticated Ploinky operator workflow.'
          exit 1
